name: Leak scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  # Opt into Node 24 now — Node 20 is deprecated on GitHub Actions runners
  # (default switches 2026-06-02, removed 2026-09-16). Silences the warning
  # until actions/checkout publishes a Node-24-native release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan PR-added lines for operator/identity leak markers
        env:
          # Pattern is stored as a repository secret so Actions auto-masks it
          # in step logs (including env-var setup echoes). Editing the pattern
          # is done via `gh secret set LEAK_PATTERN` rather than committing to
          # this file. Old commits in git history still contain the inline
          # pattern; that's accepted residual exposure (see incident_log.md).
          LEAK_PATTERN: ${{ secrets.LEAK_PATTERN }}
        run: |
          set -uo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          if [ -z "$LEAK_PATTERN" ]; then
            echo "::error::LEAK_PATTERN secret is unset on this repo. Set it via 'gh secret set LEAK_PATTERN'."
            exit 1
          fi

          # Only scans lines ADDED in this PR (lines starting with '+' but not
          # '+++' file headers). Pre-existing matches in untouched lines are
          # ignored — that's the design.
          # (decision recorded 2026-05-12) and is stripped before scanning.
          added=$(git diff "$base..$head" --no-color | grep -E '^\+[^+]' || true)

          if echo "$added" | grep -qiE "$LEAK_PATTERN"; then
            # IMPORTANT: do not echo matched content. Actions logs are public
            # and forever-retained — printing the matched lines would re-leak
            # the exact content we're catching. Authors should run the scan
            # locally to see what triggered it.
            echo "::error::Leak marker detected in PR-added lines. Run the leak scan locally against your diff to identify and remove the offending lines."
            exit 1
          fi
          echo "OK: no leak markers in added lines."
